<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SI-BERAS PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f4f6f9;}
.card{border-radius:12px;}
</style>
</head>

<body class="p-3">

<div class="container">

<h3 class="mb-3">📊 SI-BERAS PRO</h3>

<div class="card p-3 mb-3">
<h5>Input</h5>
<form id="form">
<input class="form-control mb-2" name="produk" placeholder="Produk">
<input class="form-control mb-2" name="client" placeholder="Client">
<input class="form-control mb-2" name="karung" placeholder="Karung">
<input class="form-control mb-2" name="beli" placeholder="Harga Beli">
<input class="form-control mb-2" name="jual" placeholder="Harga Jual">
<button class="btn btn-primary w-100">Simpan</button>
</form>
</div>

<div class="card p-3 mb-3">
<h5>Data</h5>
<table class="table table-bordered">
<thead>
<tr>
<th>Produk</th><th>Karung</th><th>Untung</th><th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<div class="card p-3">
<h5>Laporan</h5>
<select id="bulan" class="form-control mb-2">
<option value="all">Semua Bulan</option>
</select>

<select id="tahun" class="form-control mb-2"></select>

<div id="laporan"></div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbxu8F852ZEy9Chr0AxbWnEX6GMQH7c0cxZ2PjOLQwu3d_gwTP5XF3NEKojPw-MFawo/exec";

let data = [];

async function load(){
  const res = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:"read"})
  });

  const json = await res.json();
  data = json.data;

  render();
}

function render(){
  let html = "";

  data.forEach(d=>{
    html += `
    <tr>
    <td>${d[2]}</td>
    <td>${d[4]}</td>
    <td>Rp ${d[9]}</td>
    <td>
    <button onclick="hapus(${d[0]})">❌</button>
    </td>
    </tr>`;
  });

  document.getElementById("tabel").innerHTML = html;

  laporan();
}

async function hapus(id){
  await fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:"delete",id})
  });
  load();
}

document.getElementById("form").onsubmit=async(e)=>{
  e.preventDefault();
  const d = Object.fromEntries(new FormData(e.target));

  await fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:"add",...d})
  });

  load();
};

function laporan(){
  let total=0;

  data.forEach(d=>{
    total+=d[9];
  });

  document.getElementById("laporan").innerHTML=
  `<h4>Total Untung: Rp ${total}</h4>`;
}

load();

</script>

</body>
</html>
