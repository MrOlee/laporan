<!DOCTYPE html>
<html>
<head>
<title>SI BERAS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f2f2f2;padding:20px;}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;}
button{padding:10px;width:100%;background:#4361ee;color:white;border:none;border-radius:5px;}
input{width:100%;padding:8px;margin:5px 0;}
</style>
</head>

<body>

<h2>SI-BERAS</h2>

<div class="card">
<h3>Input Penjualan</h3>

<form id="form">
<input name="namaProduk" placeholder="Produk" required>
<input name="namaClient" placeholder="Client" required>

<input type="number" name="jumlahKarung" placeholder="Jumlah Karung" required>
<input type="number" name="hargaBeli" placeholder="Harga Beli / Karung" required>
<input type="number" name="hargaJual" placeholder="Harga Jual / Karung" required>

<button>SIMPAN</button>
</form>
</div>

<div class="card">
<h3>Riwayat</h3>
<button onclick="load()">Refresh</button>

<table border="1" width="100%" id="tabel">
<tr>
<th>Tanggal</th>
<th>Produk</th>
<th>Karung</th>
<th>Untung</th>
</tr>
</table>
</div>

<script>

// 🔴 PASTE URL WEB APP DI SINI
const URL = "https://script.google.com/macros/s/AKfycbyGrUx99zlwpqiT6Csa5fLayYpRAr910562ySDen1Y6kVB-r1LrN92L4rvCqXVfy_hA/exec";


// 🔹 LOAD DATA
async function load(){
  try{
    const res = await fetch(URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:"read"})
    });

    const json = await res.json();

    let html = `
    <tr>
    <th>Tanggal</th>
    <th>Produk</th>
    <th>Karung</th>
    <th>Untung</th>
    </tr>`;

    json.data.forEach(r=>{
      html += `
      <tr>
      <td>${new Date(r[0]).toLocaleDateString()}</td>
      <td>${r[1]}</td>
      <td>${r[3]}</td>
      <td>Rp ${r[9]}</td>
      </tr>`;
    });

    document.getElementById("tabel").innerHTML = html;

  }catch(e){
    alert("Error load: "+e);
  }
}


// 🔹 SUBMIT
document.getElementById("form").addEventListener("submit",async(e)=>{
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target).entries());

  try{
    const res = await fetch(URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });

    const json = await res.json();

    if(json.result=="success"){
      alert("✅ Berhasil disimpan");
      e.target.reset();
      load();
    }else{
      alert("❌ "+json.error);
    }

  }catch(err){
    alert("❌ Gagal koneksi");
  }

});

</script>

</body>
</html>
