<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Penjualan Beras</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --primary-color: #4361ee;
    --secondary-color: #3f37c9;
}
body { background:#f8f9fa; }
.card { border-radius:12px; }
.section { display:none; }
.section.active { display:block; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white shadow-sm mb-4">
<div class="container">
    <b class="text-primary">SI-BERAS</b>
    <div>
        <button class="btn btn-sm btn-outline-primary" onclick="showSection('inputSection')">Input</button>
        <button class="btn btn-sm btn-outline-primary" onclick="showSection('historySection')">Riwayat</button>
        <button class="btn btn-sm btn-outline-primary" onclick="showSection('reportSection')">Laporan</button>
    </div>
</div>
</nav>

<div class="container">

<!-- INPUT -->
<div id="inputSection" class="section active">
<div class="card p-4">
<h5>Input Penjualan</h5>

<form id="salesForm">
<input name="namaProduk" class="form-control mb-2" placeholder="Nama Produk" required>
<input name="namaClient" class="form-control mb-2" placeholder="Nama Client" required>

<label>Jumlah Karung</label>
<input type="number" name="jumlahKarung" class="form-control mb-2" required>

<label>Harga Beli / Karung</label>
<input type="number" name="hargaBeli" class="form-control mb-2" required>

<label>Harga Jual / Karung</label>
<input type="number" name="hargaJual" class="form-control mb-2" required>

<button class="btn btn-primary w-100 mt-2">Simpan</button>
</form>
</div>
</div>

<!-- RIWAYAT -->
<div id="historySection" class="section">
<div class="card p-3">
<h5>Riwayat</h5>

<table class="table">
<thead>
<tr>
<th>Tanggal</th>
<th>Produk</th>
<th>Karung</th>
<th>Untung</th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
</table>

<button onclick="loadData()" class="btn btn-sm btn-primary">Refresh</button>
</div>
</div>

<!-- LAPORAN -->
<div id="reportSection" class="section">

<div class="row mb-3">
<div class="col">
<div class="card p-3 text-white" style="background:linear-gradient(45deg,#4361ee,#3f37c9)">
Total Untung
<h3 id="totalProfit">0</h3>
</div>
</div>

<div class="col">
<div class="card p-3">
Total Karung
<h3 id="totalKarung">0</h3>
</div>
</div>

<div class="col">
<div class="card p-3">
Total Transaksi
<h3 id="totalTrx">0</h3>
</div>
</div>
</div>

<table class="table table-bordered">
<thead>
<tr>
<th>Periode</th>
<th>Karung</th>
<th>Omset</th>
<th>Untung</th>
</tr>
</thead>
<tbody id="reportBody"></tbody>
</table>

</div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz323sOqgJ3l9DU6Ve2oE3qT015onq7UxrMz7odgs548DFR2Y6yL3CnY1nEzT1SxeJ5/exec';

let rawData = [];

// pindah menu
function showSection(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id !== 'inputSection') loadData();
}

// ambil data
async function loadData(){
    const res = await fetch(SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'read'})
    });

    const json = await res.json();
    rawData = json.data;

    renderHistory();
    renderReport();
}

// tampil riwayat
function renderHistory(){
    const body = document.getElementById('historyBody');

    body.innerHTML = rawData.slice(-10).reverse().map(r=>`
        <tr>
            <td>${new Date(r[0]).toLocaleDateString()}</td>
            <td>${r[1]}</td>
            <td>${r[3]} Karung</td>
            <td class="text-success">Rp ${r[9].toLocaleString()}</td>
        </tr>
    `).join('');
}

// laporan
function renderReport(){
    let totalKarung=0,totalOmset=0,totalUntung=0;

    rawData.forEach(r=>{
        totalKarung += r[3];
        totalOmset += r[8];
        totalUntung += r[9];
    });

    document.getElementById('totalKarung').innerText = totalKarung;
    document.getElementById('totalProfit').innerText = "Rp "+totalUntung.toLocaleString();
    document.getElementById('totalTrx').innerText = rawData.length;

    document.getElementById('reportBody').innerHTML = `
    <tr>
        <td>Semua Data</td>
        <td>${totalKarung}</td>
        <td>Rp ${totalOmset.toLocaleString()}</td>
        <td class="text-success">Rp ${totalUntung.toLocaleString()}</td>
    </tr>`;
}

// submit
document.getElementById('salesForm').addEventListener('submit',async(e)=>{
    e.preventDefault();

    const data = Object.fromEntries(new FormData(e.target).entries());

    await fetch(SCRIPT_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(data)
    });

    alert("Berhasil disimpan!");
    e.target.reset();
});
</script>

</body>
</html>
