<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background-color: #f8f9fa; }
    .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; margin-bottom: 25px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Input Penjualan Beras</h2>
    <form id="salesForm" onsubmit="handleFormSubmit(this)">
      <div class="mb-3">
        <label class="form-label">Nama Produk</label>
        <input type="text" name="namaProduk" class="form-control" required placeholder="Contoh: Beras Premium">
      </div>
      <div class="mb-3">
        <label class="form-label">Nama Client</label>
        <input type="text" name="namaClient" class="form-control" required>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Berat (kg)</label>
          <input type="number" name="kg" class="form-control" step="0.01" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Harga Beli (per kg)</label>
          <input type="number" name="hargaBeli" class="form-control" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Harga Jual (per kg)</label>
          <input type="number" name="hargaJual" class="form-control" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">Simpan Laporan</button>
    </form>
    <div id="message" class="mt-3 text-center"></div>
  </div>

  <script>
    function handleFormSubmit(formObject) {
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('message').innerHTML = "Sedang menyimpan...";
      google.script.run.withSuccessHandler(function(msg) {
        document.getElementById('message').innerHTML = '<div class="alert alert-success">' + msg + '</div>';
        document.getElementById('salesForm').reset();
        document.getElementById('submitBtn').disabled = false;
      }).submitData(formObject);
    }
  </script>
</body>
</html>
