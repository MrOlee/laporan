<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Penjualan Beras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #2ecc71; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #27ae60; }
        .header-section { background: #2c3e50; color: white; padding: 40px 0; margin-bottom: -50px; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <h2>Sistem Laporan Penjualan</h2>
    <p>Input data penjualan harian secara real-time</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <form id="salesForm">
                    <div class="mb-3">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" name="namaProduk" class="form-control" placeholder="Contoh: Beras Cianjur" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nama Client</label>
                        <input type="text" name="namaClient" class="form-control" placeholder="Nama pembeli" required>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Berat (kg)</label>
                            <input type="number" name="kg" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Harga Beli /kg</label>
                            <input type="number" name="hargaBeli" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Harga Jual /kg</label>
                            <input type="number" name="hargaJual" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3" id="submitBtn">SIMPAN DATA KE GOOGLE SHEETS</button>
                </form>
                <div id="statusMessage" class="mt-4 text-center"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // GANTI URL DI BAWAH INI DENGAN URL DARI GOOGLE APPS SCRIPT ANDA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4mHS-8W4DmWGuuhuSnNY6CH8D_mdfuB5psTV801g2KjzEwCp4rOoN-xRy1Bc6JmiE/exec';

    const form = document.getElementById('salesForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMessage');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = 'Sedang Mengirim...';
        status.innerHTML = '';

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(response => {
            if(response.result === 'success') {
                status.innerHTML = '<div class="alert alert-success">Data berhasil tersimpan di Google Sheets!</div>';
                form.reset();
            } else {
                status.innerHTML = '<div class="alert alert-danger">Terjadi kesalahan saat menyimpan data.</div>';
            }
        })
        .catch(error => {
            status.innerHTML = '<div class="alert alert-danger">Koneksi Gagal: ' + error.message + '</div>';
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = 'SIMPAN DATA KE GOOGLE SHEETS';
        });
    });
</script>

</body>
</html>
