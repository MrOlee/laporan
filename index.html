<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SI-BERAS PRO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f6fa; }
.navbar { background:#1e3a8a; }
.navbar a { color:white !important; }
.card { border-radius:12px; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand text-white">SI-BERAS</a>

<div>
<button class="btn btn-light btn-sm" onclick="show('input')">Input</button>
<button class="btn btn-light btn-sm" onclick="show('data')">Data</button>
<button class="btn btn-light btn-sm" onclick="show('laporan')">Laporan</button>
</div>
</div>
</nav>

<div class="container mt-4">

<!-- INPUT -->
<div id="input" class="section">
<div class="card p-3">
<h5>Input Penjualan</h5>

<form id="form">
<input name="produk" class="form-control mb-2" placeholder="Produk" required>
<input name="client" class="form-control mb-2" placeholder="Nama Client" required>

<input name="karung" type="number" class="form-control mb-2" placeholder="Jumlah Karung" required>
<input name="beli" type="number" class="form-control mb-2" placeholder="Harga Beli" required>
<input name="jual" type="number" class="form-control mb-2" placeholder="Harga Jual" required>

<button class="btn btn-primary w-100">Simpan</button>
</form>
</div>
</div>

<!-- DATA -->
<div id="data" class="section" style="display:none">
<div class="card p-3">
<h5>Data Penjualan</h5>

<table class="table table-bordered">
<thead>
<tr>
<th>Produk</th>
<th>Client</th>
<th>Karung</th>
<th>Untung</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabel"></tbody>
</table>

<button onclick="load()" class="btn btn-primary btn-sm">Refresh</button>
</div>
</div>

<!-- LAPORAN -->
<div id="laporan" class="section" style="display:none">
<div class="card p-3">
<h5>Laporan</h5>

<select id="bulan" class="form-control mb-2">
<option value="all">Semua Bulan</option>
</select>

<select id="tahun" class="form-control mb-2"></select>

<div id="hasil"></div>
</div>
</div>

</div>

<script>

const URL = 'https://script.google.com/macros/s/AKfycbwR4gXEqLEg3-ywIE4wVhGm67mVA0MOHrEwiDUOUBkxTqhdsB1E6LwQXRRVNoQYYIuv/exec';

let data = [];

function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
if(id!='input') load();
}

// LOAD DATA
async function load(){
const res = await fetch(URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'read'})
});

const json = await res.json();
data = json.data;

render();
}

// RENDER
function render(){
let html="";

data.forEach(d=>{
html+=`
<tr>
<td>${d[2]}</td>
<td>${d[3]}</td>
<td>${d[4]}</td>
<td>Rp ${d[9]}</td>
<td><button onclick="hapus(${d[0]})">❌</button></td>
</tr>
`;
});

document.getElementById("tabel").innerHTML=html;

laporan();
}

// DELETE
async function hapus(id){
await fetch(URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'delete',id})
});
load();
}

// SUBMIT
document.getElementById("form").onsubmit=async(e)=>{
e.preventDefault();

const d = Object.fromEntries(new FormData(e.target));

await fetch(URL,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({action:'add',...d})
});

alert("Berhasil disimpan");
e.target.reset();
};

// LAPORAN
function laporan(){
let total=0;

data.forEach(d=>{
total+=d[9];
});

document.getElementById("hasil").innerHTML=
`<h4>Total Untung: Rp ${total.toLocaleString()}</h4>`;
}

</script>

</body>
</html>
